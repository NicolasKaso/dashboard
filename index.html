<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Good <span id="greeting-word">morning</span></h1>
      <div class="header-sub">Here's your day at a glance</div>
    </div>
    <div class="header-right">
      <div class="header-date" id="header-date"></div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span id="theme-icon">☀</span>
      </button>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Calendar -->
    <div class="card cal-card">
      <div class="card-header">
        <span class="card-title">Calendar</span>
        <div class="cal-controls">
          <div class="view-tabs">
            <button class="view-tab active" id="tab-day"   onclick="setView('day')">Day</button>
            <button class="view-tab"        id="tab-week"  onclick="setView('week')">Week</button>
            <button class="view-tab"        id="tab-month" onclick="setView('month')">Month</button>
            <button class="view-tab"        id="tab-year"  onclick="setView('year')">Year</button>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="navCal(-1)">&#8249;</button>
            <span class="cal-nav-label" id="cal-nav-label"></span>
            <button class="cal-nav-btn" onclick="navCal(1)">&#8250;</button>
            <button class="cal-nav-btn today-btn" onclick="goToday()">Today</button>
          </div>
          <button class="gcal-btn" id="gcal-btn" onclick="handleGCalAuth()">
            <span class="gcal-dot"></span>
            <span id="gcal-label">Connect Google Calendar</span>
          </button>
        </div>
      </div>
      <div class="card-body no-pad">
        <div id="cal-container"></div>
      </div>
    </div>

    <!-- RIGHT: Sidebar -->
    <div class="right-col">

      <!-- Deadlines -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Upcoming deadlines</span>
          <div class="header-actions">
            <button class="btn-subtle" onclick="toggleSettings()">Filter</button>
            <button class="btn-accent" onclick="openDeadlineModal()">+ Add</button>
          </div>
        </div>
        <div class="card-body">
          <div class="settings-panel" id="settings-panel" style="display:none;">
            <div class="settings-label">Exclude words from auto-deadlines</div>
            <div class="tag-row" id="exclude-tags"></div>
            <div class="tag-input-row">
              <input class="tag-input" type="text" id="exclude-input" placeholder="e.g. lecture, lab..." onkeydown="if(event.key==='Enter')addExcludeTag()">
              <button class="tag-add-btn" onclick="addExcludeTag()">Add</button>
            </div>
          </div>
          <div class="deadline-list" id="deadline-list"></div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Tasks &amp; assignments</span>
          <div class="filter-tabs">
            <button class="filter-tab active" id="filter-all"        onclick="filterTasks('all')">All</button>
            <button class="filter-tab"        id="filter-assignment" onclick="filterTasks('assignment')">Assignments</button>
            <button class="filter-tab"        id="filter-todo"       onclick="filterTasks('todo')">To-do</button>
            <button class="filter-tab"        id="filter-gtasks"     onclick="filterTasks('gtasks')">Google Tasks</button>
          </div>
        </div>
        <div class="card-body">
          <div class="task-input-row">
            <input class="field" type="text" id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
            <select class="field field-sm" id="task-type">
              <option value="todo">To-do</option>
              <option value="assignment">Assignment</option>
            </select>
            <button class="btn-primary" onclick="addTask()">Add</button>
          </div>
          <div class="tasks-list" id="tasks-list"></div>
        </div>
      </div>

      <!-- Drive -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Notes &amp; PDFs</span>
          <div class="header-actions">
            <span id="drive-status" class="drive-status"></span>
            <button id="drive-back-btn" class="btn-subtle" onclick="driveGoBack()" style="display:none;">&#8592; Back</button>
          </div>
        </div>
        <div class="card-body">
          <div class="drive-path" id="drive-path"></div>
          <div id="drive-content"><div class="empty-state">Connect Google Calendar above to browse your Drive</div></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Deadline modal -->
  <div class="modal-overlay" id="deadline-modal">
    <div class="modal">
      <h3>Add deadline</h3>
      <input class="field" type="text" id="dl-name" placeholder="Assignment name" style="width:100%;margin-bottom:9px;">
      <input class="field" type="text" id="dl-course" placeholder="Course / subject" style="width:100%;margin-bottom:9px;">
      <input class="field" type="date" id="dl-date" style="width:100%;margin-bottom:9px;">
      <div class="modal-row">
        <button class="btn-subtle modal-btn" onclick="closeDeadlineModal()">Cancel</button>
        <button class="btn-primary modal-btn" onclick="confirmDeadline()">Add deadline</button>
      </div>
    </div>
  </div>

  <!-- PDF preview -->
  <div class="pdf-modal" id="pdf-modal">
    <div class="pdf-modal-bar">
      <span class="pdf-modal-title" id="pdf-modal-title"></span>
      <a id="pdf-open-link" href="#" target="_blank" class="btn-accent" style="text-decoration:none;font-size:12px;">Open in Drive</a>
      <button class="btn-subtle" onclick="closePdfModal()">Close</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdf-iframe" src=""></iframe>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
