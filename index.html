<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c2692a">
  <link rel="manifest" href="manifest.json">
  <title>Nicolas Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Styles — order matters: tokens first, feature sheets after, midnight overrides last -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="calendar.css">
  <link rel="stylesheet" href="deadlines.css">
  <link rel="stylesheet" href="tasks.css">
  <link rel="stylesheet" href="drive.css">
  <link rel="stylesheet" href="modals.css">
  <link rel="stylesheet" href="midnight.css">
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Good <span id="greeting-word">morning</span></h1>
      <div class="header-sub">Here's your day at a glance</div>
    </div>
    <div class="header-right">
      <div class="header-date" id="header-date"></div>
      <button class="btn-subtle dark-variant-btn" id="dark-variant-btn" onclick="window.cycleDarkVariant?.()" style="display:none;">Classic</button>
      <div class="theme-switch" role="group">
        <button class="theme-chip active" id="theme-light-btn" onclick="window.setThemeMode?.('light')">Light</button>
        <button class="theme-chip"        id="theme-dark-btn"  onclick="window.setThemeMode?.('dark')">Dark</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- LEFT: Calendar -->
    <div class="card cal-card">
      <div class="card-header">
        <span class="card-title">Calendar</span>
        <div class="cal-controls">
          <div class="view-tabs">
            <button class="view-tab"        id="tab-day"   onclick="window.setView?.('day')">Day</button>
            <button class="view-tab active" id="tab-week"  onclick="window.setView?.('week')">Week</button>
            <button class="view-tab"        id="tab-month" onclick="window.setView?.('month')">Month</button>
            <button class="view-tab"        id="tab-year"  onclick="window.setView?.('year')">Year</button>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="window.navCal?.(-1)">&#8249;</button>
            <span class="cal-nav-label" id="cal-nav-label"></span>
            <button class="cal-nav-btn" onclick="window.navCal?.(1)">&#8250;</button>
            <button class="cal-nav-btn today-btn" onclick="window.goToday?.()">Today</button>
          </div>
          <button class="gcal-btn" id="gcal-btn" onclick="window.handleGCalAuth?.()">
            <span class="gcal-dot"></span>
            <span id="gcal-label">Connect Google Calendar</span>
          </button>
        </div>
      </div>
      <div class="card-body no-pad">
        <div id="cal-container"></div>
      </div>
    </div>

    <!-- RIGHT: Sidebar -->
    <div class="right-col">

      <!-- Deadlines -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Upcoming deadlines</span>
          <div class="header-actions">
            <button class="btn-subtle" onclick="window.toggleSettings?.()">Filter</button>
            <button class="btn-accent" onclick="window.openDeadlineModal?.()">+ Add</button>
          </div>
        </div>
        <div class="card-body">
          <div class="settings-panel" id="settings-panel" style="display:none;">
            <div class="settings-label">Exclude words from auto-deadlines</div>
            <div class="tag-row" id="exclude-tags"></div>
            <div class="tag-input-row">
              <input class="tag-input" type="text" id="exclude-input" placeholder="e.g. lecture, lab..."
                onkeydown="if(event.key==='Enter')window.addExcludeTag?.()">
              <button class="tag-add-btn" onclick="window.addExcludeTag?.()">Add</button>
            </div>
          </div>
          <div class="deadline-list" id="deadline-list"></div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Tasks &amp; assignments</span>
          <div class="filter-tabs">
            <button class="filter-tab active" id="filter-all"        onclick="window.filterTasks?.('all')">All</button>
            <button class="filter-tab"        id="filter-assignment" onclick="window.filterTasks?.('assignment')">Assignments</button>
            <button class="filter-tab"        id="filter-todo"       onclick="window.filterTasks?.('todo')">To-do</button>
          </div>
        </div>
        <div class="card-body">
          <div class="task-input-row">
            <input class="field" type="text" id="task-input" placeholder="Add a task..."
              onkeydown="if(event.key==='Enter')window.addTask?.()">
            <select class="field field-sm" id="task-type">
              <option value="todo">To-do</option>
              <option value="assignment">Assignment</option>
            </select>
            <button class="filter-tab" id="urgent-toggle-btn"
              onclick="window.toggleUrgentInput?.()" title="Mark as urgent">! Urgent</button>
            <button class="btn-primary" onclick="window.addTask?.()">Add</button>
          </div>
          <div class="tasks-list" id="tasks-list"></div>
        </div>
      </div>

      <!-- Drive -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Files</span>
          <div class="header-actions">
            <span id="drive-status" class="drive-status"></span>
            <button id="drive-back-btn" class="btn-subtle" onclick="window.driveGoBack?.()" style="display:none;">&#8592; Back</button>
          </div>
        </div>
        <div class="card-header" style="padding-top:8px;padding-bottom:8px;border-top:none;">
          <div class="filter-tabs">
            <button class="filter-tab drive-filter-tab active" data-filter="all"    onclick="window.setAllDriveFilters?.(true)">All</button>
            <button class="filter-tab drive-filter-tab active" data-filter="folder" onclick="window.toggleDriveFilter?.('folder')">Folders</button>
            <button class="filter-tab drive-filter-tab active" data-filter="pdf"    onclick="window.toggleDriveFilter?.('pdf')">PDFs</button>
            <button class="filter-tab drive-filter-tab active" data-filter="doc"    onclick="window.toggleDriveFilter?.('doc')">Docs</button>
            <button class="filter-tab drive-filter-tab active" data-filter="image"  onclick="window.toggleDriveFilter?.('image')">Images</button>
            <button class="filter-tab drive-filter-tab active" data-filter="sheet"  onclick="window.toggleDriveFilter?.('sheet')">Sheets</button>
            <button class="filter-tab drive-filter-tab active" data-filter="slides" onclick="window.toggleDriveFilter?.('slides')">Slides</button>
            <div class="drive-filter-extra">
              <button class="filter-tab drive-filter-more-btn" onclick="window.toggleDriveMoreMenu?.()">More &#9662;</button>
              <div class="drive-filter-menu" id="drive-filter-menu">
                <label class="drive-filter-menu-item">
                  <input type="checkbox" id="drive-filter-other"
                    onchange="window.toggleHiddenDriveType?.('other', this.checked)">
                  <span>Other files</span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="drive-path" id="drive-path"></div>
          <div id="drive-content">
            <div class="empty-state">Connect Google Calendar above to browse your Drive</div>
          </div>
        </div>
      </div>

    </div><!-- /.right-col -->
  </div><!-- /.layout -->

  <!-- Add Deadline Modal -->
  <div class="modal-overlay" id="deadline-modal">
    <div class="modal">
      <h3>Add deadline</h3>
      <input class="field" type="text"  id="dl-name"   placeholder="Assignment name"   style="width:100%;margin-bottom:9px;">
      <input class="field" type="text"  id="dl-course" placeholder="Course / subject"  style="width:100%;margin-bottom:9px;">
      <input class="field" type="date"  id="dl-date"                                   style="width:100%;margin-bottom:9px;">
      <div class="modal-row">
        <button class="btn-subtle modal-btn" onclick="window.closeDeadlineModal?.()">Cancel</button>
        <button class="btn-primary modal-btn" onclick="window.confirmDeadline?.()">Add deadline</button>
      </div>
    </div>
  </div>

  <!-- PDF Viewer Modal -->
  <div class="pdf-modal" id="pdf-modal">
    <div class="pdf-modal-bar">
      <span class="pdf-modal-title" id="pdf-modal-title"></span>
      <a id="pdf-open-link" href="#" target="_blank" class="btn-accent"
        style="text-decoration:none;font-size:12px;">Open in Drive</a>
      <button class="btn-subtle" onclick="window.closePdfModal?.()">Close</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdf-iframe" src=""></iframe>
    </div>
  </div>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal event-modal">
      <h3 id="event-title">Event</h3>
      <div class="event-meta" id="event-when"></div>
      <div class="event-meta" id="event-where" style="display:none;"></div>
      <div class="event-desc" id="event-desc-view" style="display:none;"></div>

      <!-- Edit form (hidden until Edit is clicked) -->
      <div id="event-edit-form" style="display:none;margin-top:12px;">
        <input class="field" type="text" id="edit-title" placeholder="Title"
          style="width:100%;margin-bottom:8px;">
        <input class="field" type="text" id="edit-location" placeholder="Location"
          style="width:100%;margin-bottom:8px;">
        <textarea class="field" id="edit-desc" placeholder="Description" rows="3"
          style="width:100%;margin-bottom:8px;resize:vertical;font-family:var(--font-body);"></textarea>
        <div id="edit-time-row" style="display:flex;gap:8px;margin-bottom:8px;">
          <input class="field" type="datetime-local" id="edit-start" style="flex:1;min-width:0;">
          <input class="field" type="datetime-local" id="edit-end"   style="flex:1;min-width:0;">
        </div>
      </div>

      <div class="event-actions">
        <a class="btn-accent" id="event-open-link" href="#" target="_blank"
          style="text-decoration:none;">Open in Google Calendar</a>
        <button class="btn-subtle" id="event-edit-btn" onclick="window.toggleEventEdit?.()" style="display:none;">Edit</button>
        <button class="btn-primary" id="event-save-btn" onclick="window.saveEventEdit?.()" style="display:none;">Save</button>
        <button class="btn-subtle" onclick="window.closeEventModal?.()">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:1000;"></div>

  <!-- Scripts — order matters: shared utilities first, features next, boot last -->
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="theme.js"></script>
  <script src="google-api.js"></script>
  <script src="calendar.js"></script>
  <script src="deadlines.js"></script>
  <script src="tasks.js"></script>
  <script src="drive.js"></script>
  <script src="modals.js"></script>
  <script src="init.js"></script>

</body>
</html>
