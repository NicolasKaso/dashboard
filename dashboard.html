<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ed; --surface: #ffffff; --surface2: #f0ece4;
    --text: #1a1714; --text2: #6b6560; --text3: #a09a93;
    --accent: #c2692a; --accent-light: #f5e8dc;
    --accent2: #3b6b52; --accent2-light: #dff0e7;
    --danger: #c23b3b; --danger-light: #fce8e8;
    --warn: #b07020; --warn-light: #fdf0dc;
    --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
    --radius: 14px; --radius-sm: 8px;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 24px 60px; max-width: 1080px; margin: 0 auto; }
  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid var(--border2); flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-family: var(--font-display); font-size: 38px; font-weight: 400; letter-spacing: -0.5px; line-height: 1; }
  .header-left h1 span { color: var(--accent); font-style: italic; }
  .header-date { font-size: 13px; color: var(--text3); font-weight: 300; letter-spacing: 0.5px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .card-full { grid-column: 1 / -1; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; border-bottom: 1px solid var(--border); gap: 8px; flex-wrap: wrap; }
  .card-title { font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
  .card-body { padding: 16px 20px 20px; }
  .empty-state { text-align: center; padding: 18px; color: var(--text3); font-size: 13px; }

  /* Calendar nav */
  .cal-nav { display: flex; align-items: center; gap: 6px; }
  .cal-nav-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: var(--text2); }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-nav-label { font-size: 12px; font-weight: 500; color: var(--text2); min-width: 110px; text-align: center; }
  .view-tabs { display: flex; gap: 3px; background: var(--surface2); border-radius: 7px; padding: 3px; }
  .view-tab { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text3); font-family: var(--font-body); }
  .view-tab.active { background: var(--surface); color: var(--text); }

  /* Week view */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
  .day-col { text-align: center; }
  .day-name { font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
  .day-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 13px; color: var(--text2); cursor: pointer; }
  .day-num:hover { background: var(--surface2); }
  .day-num.today { background: var(--accent); color: white; font-weight: 500; }
  .day-num.selected { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .day-num.today.selected { background: var(--accent); color: white; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); margin: 2px auto 0; }

  /* Month view */
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .month-day-name { text-align: center; font-size: 10px; font-weight: 500; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text3); padding: 4px 0 6px; }
  .month-day { min-height: 36px; border-radius: 6px; padding: 4px; cursor: pointer; }
  .month-day:hover { background: var(--surface2); }
  .month-day-num { font-size: 12px; color: var(--text2); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .month-day.today .month-day-num { background: var(--accent); color: white; font-weight: 500; }
  .month-day.selected .month-day-num { background: var(--accent-light); color: var(--accent); }
  .month-day.other-month .month-day-num { color: var(--text3); }
  .month-event-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); margin: 1px auto; }

  /* Year view */
  .year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .mini-month { cursor: pointer; }
  .mini-month-title { font-size: 11px; font-weight: 500; color: var(--text2); text-align: center; margin-bottom: 4px; }
  .mini-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
  .mini-day { width: 100%; aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--text3); }
  .mini-day.today { background: var(--accent); color: white; }
  .mini-day.has-event { background: var(--accent2-light); color: var(--accent2); }

  /* Events */
  .event-list { display: flex; flex-direction: column; gap: 7px; }
  .event-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 3px solid var(--accent2); }
  .event-time { font-size: 11px; color: var(--text3); font-weight: 500; min-width: 70px; flex-shrink: 0; }
  .event-name { font-size: 13px; color: var(--text); flex: 1; }

  /* Tasks */
  .task-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .task-input { flex: 1; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; background: var(--surface2); color: var(--text); outline: none; }
  .task-input:focus { border-color: var(--accent); background: white; }
  .task-input::placeholder { color: var(--text3); }
  select.task-input { cursor: pointer; flex: 0; min-width: 110px; }
  .add-btn { padding: 9px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .tasks-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--surface2); }
  .task-item.done { opacity: 0.4; }
  .task-item.done .task-text { text-decoration: line-through; }
  .task-check { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border2); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .task-check.checked { background: var(--accent2); border-color: var(--accent2); }
  .task-check.checked::after { content: ''; width: 9px; height: 5px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); }
  .task-text { font-size: 13px; flex: 1; color: var(--text); }
  .task-source { font-size: 10px; color: var(--text3); }
  .task-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-todo { background: var(--accent2-light); color: var(--accent2); }
  .badge-assignment { background: var(--warn-light); color: var(--warn); }
  .badge-deadline { background: var(--danger-light); color: var(--danger); }
  .badge-gtasks { background: #e8f0fe; color: #1a73e8; }
  .task-delete { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 14px; opacity: 0; width: 20px; flex-shrink: 0; }
  .task-item:hover .task-delete { opacity: 1; }

  /* Deadlines */
  .deadline-list { display: flex; flex-direction: column; gap: 8px; }
  .deadline-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); gap: 10px; }
  .deadline-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .deadline-course { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .deadline-date { font-size: 12px; font-weight: 500; text-align: right; white-space: nowrap; }
  .deadline-days { font-size: 11px; color: var(--text3); margin-top: 1px; text-align: right; }
  .urgent { color: var(--danger); } .soon { color: var(--warn); } .ok { color: var(--accent2); }

  /* Drive browser */
  .drive-path { display: flex; align-items: center; gap: 6px; padding: 0 0 12px; flex-wrap: wrap; }
  .drive-crumb { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500; }
  .drive-crumb:hover { text-decoration: underline; }
  .drive-sep { font-size: 12px; color: var(--text3); }
  .drive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .drive-item { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 14px 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; text-align: center; }
  .drive-item:hover { border-color: var(--border2); background: white; }
  .drive-item-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; word-break: break-word; }
  .drive-item-meta { font-size: 10px; color: var(--text3); }
  .drive-loading { text-align: center; padding: 24px; color: var(--text3); font-size: 13px; }

  /* PDF preview modal */
  .pdf-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; flex-direction: column; }
  .pdf-modal.open { display: flex; }
  .pdf-modal-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .pdf-modal-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 12px; }
  .pdf-close { padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; font-family: var(--font-body); font-size: 13px; cursor: pointer; color: var(--text2); }
  .pdf-modal-body { flex: 1; overflow: hidden; }
  .pdf-modal-body iframe { width: 100%; height: 100%; border: none; }

  /* Folders */
  .folders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .folder-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; text-decoration: none; }
  .folder-item:hover { border-color: var(--border2); background: white; }
  .folder-name { font-size: 12px; font-weight: 500; color: var(--text); text-align: center; }
  .folder-count { font-size: 10px; color: var(--text3); }
  .add-folder-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 10px 12px; background: transparent; border-radius: var(--radius-sm); cursor: pointer; border: 1.5px dashed var(--border2); }
  .add-folder-btn:hover { border-color: var(--accent); }
  .add-folder-plus { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .add-folder-label { font-size: 11px; color: var(--text3); }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; display: none; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 360px; border: 1px solid var(--border); max-width: 90vw; }
  .modal h3 { font-family: var(--font-display); font-size: 20px; font-weight: 400; margin-bottom: 16px; }
  .modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; background: var(--surface2); color: var(--text); outline: none; margin-bottom: 10px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-row { display: flex; gap: 8px; margin-top: 6px; }
  .modal-cancel { flex: 1; padding: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; cursor: pointer; color: var(--text2); }
  .modal-confirm { flex: 1; padding: 10px; background: var(--accent); border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; color: white; }

  /* Settings panel */
  .settings-panel { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .settings-label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text2); }
  .tag-remove { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; padding: 0; }
  .tag-remove:hover { color: var(--danger); }
  .tag-input-row { display: flex; gap: 6px; }
  .tag-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 12px; background: white; color: var(--text); outline: none; }
  .tag-input:focus { border-color: var(--accent); }
  .tag-add-btn { padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: var(--font-body); }

  /* GCal button */
  .gcal-btn { display: flex; align-items: center; gap: 7px; padding: 6px 12px; background: white; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text2); white-space: nowrap; }
  .gcal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .gcal-btn.connected { background: var(--accent2-light); border-color: var(--accent2); color: var(--accent2); }
  .gcal-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } .card-full { grid-column: 1; } body { padding: 20px 14px 40px; } .year-grid { grid-template-columns: repeat(3,1fr); } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Good <span id="greeting-word">morning</span></h1>
    <div style="margin-top:4px;font-size:15px;color:var(--text2);font-weight:300;">Here's your day at a glance</div>
  </div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="grid">

  <!-- Calendar card -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Calendar</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="view-tabs">
          <button class="view-tab active" onclick="setView('week')">Week</button>
          <button class="view-tab" onclick="setView('month')">Month</button>
          <button class="view-tab" onclick="setView('year')">Year</button>
        </div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="navCal(-1)">&#8249;</button>
          <span class="cal-nav-label" id="cal-nav-label"></span>
          <button class="cal-nav-btn" onclick="navCal(1)">&#8250;</button>
          <button class="cal-nav-btn" onclick="goToday()" title="Today" style="font-size:10px;font-weight:600;color:var(--accent);border-color:var(--accent);width:auto;padding:0 7px;">Today</button>
        </div>
        <button class="gcal-btn" id="gcal-btn" onclick="handleGCalAuth()">
          <span class="gcal-dot"></span>
          <span id="gcal-label">Connect Google Calendar</span>
        </button>
      </div>
    </div>
    <div class="card-body">
      <div id="cal-view-container"></div>
      <div style="margin-top:14px;">
        <div style="font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;" id="events-day-label">Today's events</div>
        <div class="event-list" id="event-list"><div class="empty-state">Connect Google Calendar to see your events</div></div>
      </div>
    </div>
  </div>

  <!-- Deadlines card -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Upcoming deadlines</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="toggleSettings()" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font-body);cursor:pointer;">Filter</button>
        <button onclick="openDeadlineModal()" style="background:var(--accent-light);color:var(--accent);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font-body);cursor:pointer;font-weight:500;">+ Add</button>
      </div>
    </div>
    <div class="card-body">
      <div class="settings-panel" id="settings-panel" style="display:none;">
        <div class="settings-label">Exclude these words from auto-deadlines</div>
        <div class="tag-row" id="exclude-tags"></div>
        <div class="tag-input-row">
          <input class="tag-input" type="text" id="exclude-input" placeholder="e.g. lecture, lab..." onkeydown="if(event.key==='Enter') addExcludeTag()">
          <button class="tag-add-btn" onclick="addExcludeTag()">Add</button>
        </div>
      </div>
      <div class="deadline-list" id="deadline-list"></div>
    </div>
  </div>

  <!-- Tasks card -->
  <div class="card card-full">
    <div class="card-header">
      <span class="card-title">Tasks &amp; assignments</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="filterTasks('all')" id="filter-all" style="background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font-body);cursor:pointer;font-weight:500;">All</button>
        <button onclick="filterTasks('assignment')" id="filter-assignment" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font-body);cursor:pointer;">Assignments</button>
        <button onclick="filterTasks('todo')" id="filter-todo" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font-body);cursor:pointer;">To-do</button>
        <button onclick="filterTasks('gtasks')" id="filter-gtasks" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font-body);cursor:pointer;">Google Tasks</button>
      </div>
    </div>
    <div class="card-body">
      <div class="task-input-row">
        <input class="task-input" type="text" id="task-input" placeholder="Add a task or assignment..." onkeydown="if(event.key==='Enter') addTask()">
        <select class="task-input" id="task-type">
          <option value="todo">To-do</option>
          <option value="assignment">Assignment</option>
          <option value="deadline">Deadline</option>
        </select>
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
      <div class="tasks-list" id="tasks-list"></div>
    </div>
  </div>

  <!-- Google Drive / Notes card -->
  <div class="card card-full">
    <div class="card-header">
      <span class="card-title">Notes &amp; PDFs</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="drive-status" style="font-size:12px;color:var(--text3);"></span>
        <button id="drive-back-btn" onclick="driveGoBack()" style="display:none;background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font-body);cursor:pointer;">&#8592; Back</button>
      </div>
    </div>
    <div class="card-body">
      <div class="drive-path" id="drive-path"></div>
      <div id="drive-content"><div class="empty-state">Connect Google Calendar above to also browse your Google Drive files</div></div>
    </div>
  </div>

</div>

<!-- Deadline modal -->
<div class="modal-overlay" id="deadline-modal">
  <div class="modal">
    <h3>Add deadline</h3>
    <input class="modal-input" type="text" id="dl-name" placeholder="Assignment name">
    <input class="modal-input" type="text" id="dl-course" placeholder="Course / subject">
    <input class="modal-input" type="date" id="dl-date">
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeDeadlineModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDeadline()">Add deadline</button>
    </div>
  </div>
</div>

<!-- PDF preview -->
<div class="pdf-modal" id="pdf-modal">
  <div class="pdf-modal-bar">
    <span class="pdf-modal-title" id="pdf-modal-title"></span>
    <a id="pdf-open-link" href="#" target="_blank" style="padding:6px 14px;background:var(--accent-light);color:var(--accent);border:none;border-radius:6px;font-family:var(--font-body);font-size:13px;cursor:pointer;text-decoration:none;margin-right:8px;font-weight:500;">Open in Drive</a>
    <button class="pdf-close" onclick="closePdfModal()">Close</button>
  </div>
  <div class="pdf-modal-body"><iframe id="pdf-iframe" src=""></iframe></div>
</div>

<script>
const CLIENT_ID = '525270045169-ro6l87v50nn2ed2cufgdqub2qhodclfj.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks.readonly https://www.googleapis.com/auth/drive.readonly';
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const CLASS_NAMES = ['écriture et lit','écologie et évo','chimie solution','mécanique','bad. - base','calcul intégral','cult. & littér.','bad.-base','ecriture et lit','ecologie et evo'];
const DEADLINE_KEYWORDS = ['exam','test','quiz','midterm','final','due','assignment','submit','submission','deadline','essay','report','project','homework','hw','examen','devoir','travail','remise','évaluation','evaluation'];

function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}

let tasks = load('tasks',[{id:1,text:'Review lecture slides',type:'todo',done:false}]);
let deadlines = load('deadlines',[]);
let excludeWords = load('excludeWords', CLASS_NAMES.slice());
let currentFilter = 'all';
let accessToken = load('gcal_token',null);
let tokenExpiry = load('gcal_expiry',0);
let calView = 'week';
let calDate = new Date();
let selectedDate = new Date();
let calEvents = {};
let driveStack = [{id:'root',name:'My Drive'}];
let settingsOpen = false;

function isTokenValid(){return accessToken && Date.now()<tokenExpiry;}
function offsetDate(d){const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().split('T')[0];}

function initHeader(){
  const now=new Date();
  const h=now.getHours();
  document.getElementById('greeting-word').textContent=h<12?'morning':h<17?'afternoon':'evening';
  document.getElementById('header-date').textContent=`${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

// ---- Calendar ----
function setView(v){
  calView=v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===v));
  renderCalView();
}

function navCal(dir){
  if(calView==='week'){calDate.setDate(calDate.getDate()+dir*7);}
  else if(calView==='month'){calDate.setMonth(calDate.getMonth()+dir);}
  else{calDate.setFullYear(calDate.getFullYear()+dir);}
  renderCalView();
  if(isTokenValid()) fetchEventsForView();
}

function goToday(){
  calDate=new Date(); selectedDate=new Date();
  renderCalView();
  if(isTokenValid()) fetchEventsForView();
}

function selectDay(dateStr){
  selectedDate=new Date(dateStr+'T12:00:00');
  renderCalView();
  const label=document.getElementById('events-day-label');
  const today=new Date(); today.setHours(0,0,0,0);
  const sel=new Date(dateStr+'T00:00:00');
  const diff=Math.round((sel-today)/86400000);
  label.textContent=diff===0?'Today\'s events':diff===1?'Tomorrow\'s events':`Events on ${sel.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  renderEventsForDay(dateStr);
}

function renderCalView(){
  const container=document.getElementById('cal-view-container');
  const label=document.getElementById('cal-nav-label');
  if(calView==='week') renderWeekView(container,label);
  else if(calView==='month') renderMonthView(container,label);
  else renderYearView(container,label);
}

function renderWeekView(container,label){
  const now=new Date(calDate);
  const start=new Date(now); start.setDate(now.getDate()-now.getDay());
  const today=new Date(); today.setHours(0,0,0,0);
  const weekStart=new Date(start); weekStart.setHours(0,0,0,0);
  const weekEnd=new Date(start); weekEnd.setDate(start.getDate()+6);
  label.textContent=`${MONTHS_SHORT[weekStart.getMonth()]} ${weekStart.getDate()} – ${MONTHS_SHORT[weekEnd.getMonth()]} ${weekEnd.getDate()}`;
  let html='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const isToday=d.toDateString()===today.toDateString();
    const isSel=d.toDateString()===selectedDate.toDateString();
    const hasEv=(calEvents[ds]||[]).length>0;
    html+=`<div class="day-col"><div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-num${isToday?' today':''}${isSel&&!isToday?' selected':''}" onclick="selectDay('${ds}')">${d.getDate()}</div>
      ${hasEv?'<div class="day-dot"></div>':''}
    </div>`;
  }
  html+='</div>';
  container.innerHTML=html;
}

function renderMonthView(container,label){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  label.textContent=`${MONTHS[m]} ${y}`;
  const first=new Date(y,m,1);
  const today=new Date(); today.setHours(0,0,0,0);
  let html='<div class="month-grid">';
  DAYS.forEach(d=>html+=`<div class="month-day-name">${d.slice(0,1)}</div>`);
  const startPad=first.getDay();
  const prevMonth=new Date(y,m,0);
  for(let i=startPad-1;i>=0;i--){
    const d=new Date(y,m-1,prevMonth.getDate()-i);
    html+=`<div class="month-day other-month"><div class="month-day-num">${d.getDate()}</div></div>`;
  }
  const daysInMonth=new Date(y,m+1,0).getDate();
  for(let i=1;i<=daysInMonth;i++){
    const d=new Date(y,m,i);
    const ds=d.toISOString().split('T')[0];
    const isToday=d.toDateString()===today.toDateString();
    const isSel=d.toDateString()===selectedDate.toDateString();
    const hasEv=(calEvents[ds]||[]).length>0;
    html+=`<div class="month-day${isToday?' today':''}${isSel&&!isToday?' selected':''}" onclick="selectDay('${ds}')">
      <div class="month-day-num">${i}</div>
      ${hasEv?'<div class="month-event-dot"></div>':''}
    </div>`;
  }
  html+='</div>';
  container.innerHTML=html;
}

function renderYearView(container,label){
  const y=calDate.getFullYear();
  label.textContent=`${y}`;
  const today=new Date();
  let html='<div class="year-grid">';
  for(let m=0;m<12;m++){
    html+=`<div class="mini-month" onclick="calDate=new Date(${y},${m},1);setView('month')">
      <div class="mini-month-title">${MONTHS_SHORT[m]}</div>
      <div class="mini-month-grid">`;
    const first=new Date(y,m,1);
    const pad=first.getDay();
    const days=new Date(y,m+1,0).getDate();
    for(let p=0;p<pad;p++) html+=`<div class="mini-day"></div>`;
    for(let d=1;d<=days;d++){
      const dt=new Date(y,m,d);
      const ds=dt.toISOString().split('T')[0];
      const isToday=dt.toDateString()===today.toDateString();
      const hasEv=(calEvents[ds]||[]).length>0;
      html+=`<div class="mini-day${isToday?' today':hasEv?' has-event':''}">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';
  container.innerHTML=html;
}

function renderEventsForDay(dateStr){
  const list=document.getElementById('event-list');
  const evs=calEvents[dateStr]||[];
  if(!isTokenValid()){list.innerHTML='<div class="empty-state">Connect Google Calendar to see your events</div>';return;}
  if(!evs.length){list.innerHTML='<div class="empty-state">No events this day</div>';return;}
  const colors=['#3b6b52','#c2692a','#5a6b9e','#9e5a8a','#6b3b3b'];
  list.innerHTML=evs.map((e,i)=>`<div class="event-item" style="border-left-color:${colors[i%colors.length]}">
    <span class="event-time">${e.time}</span>
    <span class="event-name">${e.name}</span>
  </div>`).join('');
}

// ---- Auth ----
function handleGCalAuth(){
  if(isTokenValid()){
    if(confirm('Disconnect Google Calendar?')){
      accessToken=null; tokenExpiry=0;
      save('gcal_token',null); save('gcal_expiry',0);
      updateGCalButton(false);
      document.getElementById('event-list').innerHTML='<div class="empty-state">Connect Google Calendar to see your events</div>';
      document.getElementById('drive-content').innerHTML='<div class="empty-state">Connect Google Calendar above to also browse your Google Drive files</div>';
    }
    return;
  }
  const params=new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:window.location.href.split('?')[0].split('#')[0],
    response_type:'token',
    scope:SCOPES,
    prompt:'select_account',
  });
  const popup=window.open('https://accounts.google.com/o/oauth2/v2/auth?'+params.toString(),'gcal_auth','width=500,height=620,left=200,top=100');
  const poll=setInterval(()=>{
    try{
      const url=popup.location.href;
      if(url&&url.includes('access_token')){
        clearInterval(poll); popup.close();
        const hash=new URLSearchParams(url.split('#')[1]);
        accessToken=hash.get('access_token');
        const exp=parseInt(hash.get('expires_in')||'3600');
        tokenExpiry=Date.now()+exp*1000;
        save('gcal_token',accessToken); save('gcal_expiry',tokenExpiry);
        updateGCalButton(true);
        fetchEventsForView();
        fetchAndSyncDeadlines();
        fetchGoogleTasks();
        loadDriveFolder('root');
      }
    }catch(e){}
    if(!popup||popup.closed) clearInterval(poll);
  },500);
}

function updateGCalButton(connected){
  const btn=document.getElementById('gcal-btn');
  const label=document.getElementById('gcal-label');
  if(connected){btn.classList.add('connected');label.textContent='Google Calendar connected';}
  else{btn.classList.remove('connected');label.textContent='Connect Google Calendar';}
}

async function gFetch(url){
  const res=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}});
  const data=await res.json();
  if(data.error){
    if(data.error.code===401){
      accessToken=null; tokenExpiry=0;
      save('gcal_token',null); save('gcal_expiry',0);
      updateGCalButton(false);
    }
    throw new Error(data.error.message);
  }
  return data;
}

// ---- Fetch events for current view ----
async function fetchEventsForView(){
  let start,end;
  if(calView==='week'){
    start=new Date(calDate); start.setDate(calDate.getDate()-calDate.getDay()); start.setHours(0,0,0,0);
    end=new Date(start); end.setDate(start.getDate()+7);
  } else if(calView==='month'){
    start=new Date(calDate.getFullYear(),calDate.getMonth(),1);
    end=new Date(calDate.getFullYear(),calDate.getMonth()+1,1);
  } else {
    start=new Date(calDate.getFullYear(),0,1);
    end=new Date(calDate.getFullYear()+1,0,1);
  }
  try{
    const data=await gFetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=200`);
    (data.items||[]).forEach(e=>{
      const ds=(e.start.date||e.start.dateTime||'').split('T')[0];
      if(!ds) return;
      if(!calEvents[ds]) calEvents[ds]=[];
      const time=e.start.dateTime?new Date(e.start.dateTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'All day';
      if(!calEvents[ds].find(x=>x.name===e.summary))
        calEvents[ds].push({name:e.summary||'(no title)',time});
    });
    renderCalView();
    const selStr=selectedDate.toISOString().split('T')[0];
    renderEventsForDay(selStr);
  }catch(err){console.error(err);}
}

// ---- Deadlines from Calendar ----
function isExcluded(title){
  if(!title) return true;
  const lower=title.toLowerCase();
  return excludeWords.some(w=>w&&lower.includes(w.toLowerCase()));
}
function isDeadlineKeyword(title){
  if(!title) return false;
  const lower=title.toLowerCase();
  return DEADLINE_KEYWORDS.some(k=>lower.includes(k));
}

async function fetchAndSyncDeadlines(){
  const now=new Date(); now.setHours(0,0,0,0);
  const future=new Date(); future.setDate(future.getDate()+90);
  try{
    const data=await gFetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${future.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=100`);
    const existing=new Set(deadlines.map(d=>d.name.toLowerCase()));
    let added=0;
    (data.items||[]).forEach(e=>{
      const title=e.summary||'';
      if(isExcluded(title)) return;
      if(!isDeadlineKeyword(title)) return;
      if(existing.has(title.toLowerCase())) return;
      const dateStr=(e.start.date||e.start.dateTime||'').split('T')[0];
      if(!dateStr) return;
      deadlines.push({id:'gcal_'+e.id,name:title,course:'Google Calendar',date:dateStr,fromGcal:true});
      existing.add(title.toLowerCase());
      added++;
    });
    if(added>0){save('deadlines',deadlines);renderDeadlines();}
  }catch(err){console.error(err);}
}

// ---- Google Tasks ----
async function fetchGoogleTasks(){
  try{
    const lists=await gFetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=10');
    const taskLists=lists.items||[];
    const existing=new Set(tasks.filter(t=>t.source==='gtasks').map(t=>t.gtaskId));
    let added=0;
    for(const list of taskLists){
      const data=await gFetch(`https://tasks.googleapis.com/tasks/v1/lists/${list.id}/tasks?showCompleted=false&maxResults=50`);
      (data.items||[]).forEach(t=>{
        if(existing.has(t.id)) return;
        tasks.push({id:'gt_'+t.id,gtaskId:t.id,text:t.title,type:'gtasks',done:t.status==='completed',source:'gtasks',listName:list.title});
        existing.add(t.id);
        added++;
      });
    }
    if(added>0){save('tasks',tasks);renderTasks();}
  }catch(err){console.error('Tasks error:',err);}
}

// ---- Deadlines render ----
function renderDeadlines(){
  const list=document.getElementById('deadline-list');
  const now=new Date(); now.setHours(0,0,0,0);
  if(!deadlines.length){list.innerHTML='<div class="empty-state">No upcoming deadlines</div>';return;}
  const sorted=[...deadlines].sort((a,b)=>new Date(a.date)-new Date(b.date));
  list.innerHTML=sorted.map(d=>{
    const due=new Date(d.date+'T00:00:00');
    const diff=Math.round((due-now)/86400000);
    const cls=diff<=2?'urgent':diff<=7?'soon':'ok';
    const label=diff===0?'Today':diff===1?'Tomorrow':`In ${diff} days`;
    const dateStr=due.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="deadline-item">
      <div style="flex:1;min-width:0;">
        <div class="deadline-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.name}</div>
        <div class="deadline-course">${d.course}</div>
      </div>
      <div style="flex-shrink:0;">
        <div class="deadline-date ${cls}">${dateStr}</div>
        <div class="deadline-days">${label}</div>
      </div>
    </div>`;
  }).join('');
}

// ---- Exclude tags ----
function renderExcludeTags(){
  document.getElementById('exclude-tags').innerHTML=excludeWords.map((w,i)=>
    `<div class="tag">${w}<button class="tag-remove" onclick="removeExcludeTag(${i})">×</button></div>`
  ).join('');
}
function addExcludeTag(){
  const input=document.getElementById('exclude-input');
  const val=input.value.trim().toLowerCase();
  if(!val||excludeWords.includes(val)) return;
  excludeWords.push(val);
  save('excludeWords',excludeWords);
  input.value='';
  renderExcludeTags();
}
function removeExcludeTag(i){
  excludeWords.splice(i,1);
  save('excludeWords',excludeWords);
  renderExcludeTags();
}
function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settings-panel').style.display=settingsOpen?'block':'none';
  if(settingsOpen) renderExcludeTags();
}

// ---- Tasks ----
function renderTasks(){
  const list=document.getElementById('tasks-list');
  const filtered=currentFilter==='all'?tasks:tasks.filter(t=>t.type===currentFilter);
  if(!filtered.length){list.innerHTML='<div class="empty-state">Nothing here — add something above</div>';return;}
  const labels={todo:'To-do',assignment:'Assignment',deadline:'Deadline',gtasks:'Google Tasks'};
  list.innerHTML=filtered.map(t=>`
    <div class="task-item${t.done?' done':''}">
      <div class="task-check${t.done?' checked':''}" onclick="toggleTask('${t.id}')"></div>
      <span class="task-text">${t.text}</span>
      ${t.source==='gtasks'?`<span class="task-source">${t.listName||''}</span>`:''}
      <span class="task-badge badge-${t.type}">${labels[t.type]||t.type}</span>
      ${t.source!=='gtasks'?`<button class="task-delete" onclick="deleteTask('${t.id}')">✕</button>`:''}
    </div>`).join('');
}
function addTask(){
  const input=document.getElementById('task-input');
  const text=input.value.trim();
  if(!text) return;
  tasks.push({id:Date.now(),text,type:document.getElementById('task-type').value,done:false});
  input.value=''; save('tasks',tasks); renderTasks();
}
function toggleTask(id){
  tasks=tasks.map(t=>String(t.id)===String(id)?{...t,done:!t.done}:t);
  save('tasks',tasks); renderTasks();
}
function deleteTask(id){
  tasks=tasks.filter(t=>String(t.id)!==String(id));
  save('tasks',tasks); renderTasks();
}
function filterTasks(f){
  currentFilter=f;
  ['all','assignment','todo','gtasks'].forEach(k=>{
    const btn=document.getElementById('filter-'+k);
    if(!btn) return;
    const active=k===f;
    btn.style.background=active?'var(--accent)':'var(--surface2)';
    btn.style.color=active?'white':'var(--text2)';
    btn.style.border=active?'none':'1px solid var(--border2)';
  });
  renderTasks();
}

// ---- Deadline modal ----
function openDeadlineModal(){document.getElementById('deadline-modal').style.display='flex';document.getElementById('dl-date').value=offsetDate(7);}
function closeDeadlineModal(){document.getElementById('deadline-modal').style.display='none';}
function confirmDeadline(){
  const name=document.getElementById('dl-name').value.trim();
  const date=document.getElementById('dl-date').value;
  if(!name||!date) return;
  deadlines.push({id:Date.now(),name,course:document.getElementById('dl-course').value.trim()||'General',date});
  save('deadlines',deadlines); closeDeadlineModal(); renderDeadlines();
  document.getElementById('dl-name').value=''; document.getElementById('dl-course').value='';
}
document.getElementById('deadline-modal').addEventListener('click',function(e){if(e.target===this)closeDeadlineModal();});

// ---- Google Drive ----
function iconFor(mimeType){
  if(mimeType==='application/vnd.google-apps.folder') return '📁';
  if(mimeType==='application/pdf') return '📄';
  if(mimeType&&mimeType.includes('image')) return '🖼';
  if(mimeType&&(mimeType.includes('word')||mimeType.includes('document'))) return '📝';
  if(mimeType&&(mimeType.includes('sheet')||mimeType.includes('spreadsheet'))) return '📊';
  if(mimeType&&(mimeType.includes('presentation')||mimeType.includes('powerpoint'))) return '📑';
  return '📎';
}

async function loadDriveFolder(folderId){
  const content=document.getElementById('drive-content');
  content.innerHTML='<div class="drive-loading">Loading files...</div>';
  updateDrivePath();
  try{
    const q=folderId==='root'?`'root' in parents and trashed=false`:`'${folderId}' in parents and trashed=false`;
    const data=await gFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType,size,modifiedTime)&orderBy=folder,name&pageSize=50`);
    const files=data.files||[];
    if(!files.length){content.innerHTML='<div class="empty-state">This folder is empty</div>';return;}
    document.getElementById('drive-back-btn').style.display=driveStack.length>1?'block':'none';
    document.getElementById('drive-status').textContent=`${files.length} item${files.length!==1?'s':''}`;
    content.innerHTML=`<div class="drive-grid">${files.map(f=>`
      <div class="drive-item" onclick="driveItemClick('${f.id}','${f.mimeType.replace(/'/g,"\\'")}','${f.name.replace(/'/g,"\\'")}','${f.id}')">
        <div style="font-size:24px;line-height:1;">${iconFor(f.mimeType)}</div>
        <div class="drive-item-name">${f.name}</div>
        <div class="drive-item-meta">${f.mimeType==='application/vnd.google-apps.folder'?'Folder':f.mimeType==='application/pdf'?'PDF':'File'}</div>
      </div>`).join('')}</div>`;
  }catch(err){
    content.innerHTML='<div class="empty-state">Could not load Drive — check your connection</div>';
    console.error(err);
  }
}

function driveItemClick(id,mimeType,name){
  if(mimeType==='application/vnd.google-apps.folder'){
    driveStack.push({id,name});
    loadDriveFolder(id);
  } else if(mimeType==='application/pdf'){
    openPdfPreview(id,name);
  } else {
    window.open(`https://drive.google.com/file/d/${id}/view`,'_blank');
  }
}

function driveGoBack(){
  if(driveStack.length<=1) return;
  driveStack.pop();
  const current=driveStack[driveStack.length-1];
  loadDriveFolder(current.id);
}

function updateDrivePath(){
  const path=document.getElementById('drive-path');
  path.innerHTML=driveStack.map((item,i)=>{
    if(i===driveStack.length-1) return `<span style="font-size:12px;font-weight:500;color:var(--text2);">${item.name}</span>`;
    return `<span class="drive-crumb" onclick="driveJumpTo(${i})">${item.name}</span><span class="drive-sep">/</span>`;
  }).join('');
}

function driveJumpTo(idx){
  driveStack=driveStack.slice(0,idx+1);
  loadDriveFolder(driveStack[driveStack.length-1].id);
}

function openPdfPreview(fileId,name){
  document.getElementById('pdf-modal-title').textContent=name;
  document.getElementById('pdf-iframe').src=`https://drive.google.com/file/d/${fileId}/preview`;
  document.getElementById('pdf-open-link').href=`https://drive.google.com/file/d/${fileId}/view`;
  document.getElementById('pdf-modal').classList.add('open');
}
function closePdfModal(){
  document.getElementById('pdf-modal').classList.remove('open');
  document.getElementById('pdf-iframe').src='';
}

// ---- Init ----
initHeader();
calDate=new Date(); selectedDate=new Date();
renderCalView();
renderDeadlines();
renderTasks();

if(isTokenValid()){
  updateGCalButton(true);
  fetchEventsForView();
  fetchAndSyncDeadlines();
  fetchGoogleTasks();
  loadDriveFolder('root');
}
</script>
